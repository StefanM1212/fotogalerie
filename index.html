<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotogalerie</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <script src="script.js" defer></script>
</head>
<body>

  <header class="kopfbereich">
    <h1 class="hauptueberschrift">Fotogalerie</h1>
    <p class="untertitel">Eine Auswahl von 12 Aufnahmen</p>
  </header>

  <main class="hauptinhalt">

    <section class="fotos-bereich">
        
<ul class="fotos-reihe fotos-reihe-oben">
  <li class="foto-karte foto-karte-0"><button class="foto-button"><img class="foto-bild" src="bild1.jpg" alt="Bild 1"></button></li>
  <li class="foto-karte foto-karte-1"><button class="foto-button"><img class="foto-bild" src="Bild2.jpg" alt="Bild 2"></button></li>
  <li class="foto-karte foto-karte-2"><button class="foto-button"><img class="foto-bild" src="Bild3.jpg" alt="Bild 3"></button></li>
  <li class="foto-karte foto-karte-3"><button class="foto-button"><img class="foto-bild" src="Bild4.jpg" alt="Bild 4"></button></li>
  <li class="foto-karte foto-karte-4"><button class="foto-button"><img class="foto-bild" src="Bild5.jpg" alt="Bild 5"></button></li>
  <li class="foto-karte foto-karte-5"><button class="foto-button"><img class="foto-bild" src="Bild6.jpg" alt="Bild 6"></button></li>
  <li class="foto-karte foto-karte-6"><button class="foto-button"><img class="foto-bild" src="Bild7.jpg" alt="Bild 7"></button></li>
</ul>

<ul class="fotos-reihe fotos-reihe-unten">
  <li class="foto-karte foto-karte-7"><button class="foto-button"><img class="foto-bild" src="bild8.jpg" alt="Bild 8"></button></li>
  <li class="foto-karte foto-karte-8"><button class="foto-button"><img class="foto-bild" src="Bild9.jpg" alt="Bild 9"></button></li>
  <li class="foto-karte foto-karte-9"><button class="foto-button"><img class="foto-bild" src="Bild10.jpg" alt="Bild 10"></button></li>
  <li class="foto-karte foto-karte-10"><button class="foto-button"><img class="foto-bild" src="Bild11.jpg" alt="Bild 11"></button></li>
  <li class="foto-karte foto-karte-11"><button class="foto-button"><img class="foto-bild" src="Bild12.jpg" alt="Bild 12"></button></li>
</ul>


    </section>

  </main>

  <footer class="fussbereich">
    <p class="fuss-text">Fotogalerie &copy; 2026</p>
  </footer>

  <!-- Overlay / Lightbox -->
<div class="overlay" id="overlay">

    <div class="overlay-background"></div>

    <img class="overlay-bild" id="overlay-bild" src="" alt="">

   <div class="nav-pfeil-links">&#10094;</div>
<div class="nav-pfeil-rechts">&#10095;</div>

    <div class="overlay-schliessen">&#10006;</div>
</div>

</body>
</html>
